<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>뉴욕 맛집 리스트</title>
  <style>
    :root { --bg:#f4f7fb; --card:rgba(255,255,255,0.97); --text:#14213d; --muted:#6b7488; --line:#e5eaf3; --primary:#173b7a; --shadow:0 14px 40px rgba(15,28,63,0.10); --radius:24px; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    .page { max-width:760px; margin:0 auto; padding:0 14px 48px; }
    .hero { margin:0 -14px; height:260px; padding:0 20px 30px; color:white; background:linear-gradient(180deg, rgba(8,20,48,0.28), rgba(8,20,48,0.78)), url('https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=1400&q=80') center/cover; overflow:hidden; display:flex; flex-direction:column; justify-content:flex-end; }
    .hero-kicker { font-style:italic; opacity:0.92; font-size:18px; }
    .hero h1 { margin:8px 0 0; max-width:680px; font-size:46px; line-height:1.04; letter-spacing:0; }
    .hero-sub { margin-top:10px; max-width:680px; font-size:16px; line-height:1.45; color:rgba(255,255,255,0.92); }
    .tabbar { display:flex; gap:8px; background:#fff; margin-top:14px; padding:8px; border:1px solid var(--line); border-radius:18px; box-shadow:0 10px 24px rgba(15,28,63,0.08); }
    .tab { flex:1; text-align:center; padding:11px 10px; border-radius:12px; text-decoration:none; color:var(--muted); font-weight:700; white-space:nowrap; }
    .tab.active { background:var(--primary); color:white; }
    .section { margin-top:18px; }
    .card { background:var(--card); border:1px solid rgba(226,232,242,0.95); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; }
    .section-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:12px; }
    .section-title h2 { font-size:22px; margin:0; }
    .subtle { color:var(--muted); font-size:14px; }
    .meta-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; margin-top:12px; }
    .meta-item { padding:12px; border:1px solid var(--line); border-radius:16px; background:#fbfcff; }
    .meta-label { color:var(--muted); font-size:12px; }
    .meta-value { font-weight:700; font-size:14px; margin-top:4px; }
    .filters { display:grid; grid-template-columns:1.5fr 1fr 1fr 1fr; gap:10px; margin-top:14px; }
    .filter-control { width:100%; min-height:42px; border:1px solid var(--line); border-radius:14px; background:white; color:var(--text); padding:0 12px; font:inherit; font-size:14px; }
    .filter-tags { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .filter-tag { border:1px solid var(--line); background:white; color:var(--muted); border-radius:999px; padding:8px 11px; font-weight:800; font-size:12px; cursor:pointer; }
    .filter-tag.active { background:var(--primary); border-color:var(--primary); color:white; }
    .location-row { display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap; }
    .location-button { min-height:42px; border:1px solid #dce5f4; background:var(--primary); color:white; border-radius:14px; padding:0 14px; font:inherit; font-size:14px; font-weight:800; cursor:pointer; }
    .location-button.secondary { background:white; color:var(--primary); }
    .location-status { color:var(--muted); font-size:13px; font-weight:700; }
    .place-list { display:grid; gap:12px; }
    .place-card { display:grid; grid-template-columns:120px 1fr; gap:14px; align-items:center; border:1px solid var(--line); border-radius:18px; padding:12px; background:white; }
    .thumb { width:120px; aspect-ratio: 4 / 3; min-height:90px; border-radius:14px; background-size:cover; background-position:center; overflow:hidden; }
    .title { font-size:22px; font-weight:800; }
    .desc { color:var(--muted); font-size:14px; margin-top:4px; }
    .details { color:var(--muted); display:flex; gap:8px; flex-wrap:wrap; font-size:12px; font-weight:700; margin-top:7px; }
    .detail-dot::before { content:"·"; margin-right:8px; color:#b6becc; }
    .distance-chip { display:inline-flex; align-items:center; color:#0f7a4a; background:#eaf8ef; border-radius:999px; padding:3px 7px; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .chip { font-size:12px; padding:5px 8px; border-radius:999px; background:#f3f6fd; color:var(--primary); font-weight:700; }
    .loading { color:var(--muted); font-size:14px; padding:20px 0; }
    @media (max-width:640px) { .hero { height:248px; padding:0 18px 28px; } .hero h1 { font-size:38px; line-height:1.06; } .hero-sub { font-size:15px; line-height:1.42; } .tabbar { gap:6px; overflow-x:auto; margin-top:12px; padding:7px; border-radius:16px; } .tab { flex:0 0 auto; min-width:82px; padding:10px 10px; font-size:12px; border-radius:10px; } .meta-grid, .filters { grid-template-columns:1fr 1fr; } .filters input { grid-column:1 / -1; } .place-card { grid-template-columns:1fr; } .thumb { width:100%; aspect-ratio: 4 / 3; min-height:180px; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-kicker">Food guide</div>
      <h1>NYC Food</h1>
      <div class="hero-sub">실제 동선에 넣기 좋은 뉴욕 맛집 리스트</div>
    </section>
    <div class="tabbar">
      <a class="tab" href="./index.html">일정표</a>
      <a class="tab active" href="./food.html">맛집</a>
      <a class="tab" href="./photo-spots.html">포토스팟</a>
      <a class="tab" href="./woodbury.html">쇼핑</a>
    </div>
    <section class="section">
      <div class="card">
        <div class="section-title"><h2>뉴욕 맛집 리스트</h2><div class="subtle">places.json 기준 장소 정보를 사용합니다</div></div>
        <div class="meta-grid">
          <div class="meta-item"><div class="meta-label">지역</div><div class="meta-value">Manhattan · Brooklyn · Queens</div></div>
          <div class="meta-item"><div class="meta-label">검증 기준</div><div class="meta-value">리뷰 · 사진 · 클래식</div></div>
          <div class="meta-item"><div class="meta-label">예산</div><div class="meta-value">₩₩ ~ ₩₩₩₩</div></div>
          <div class="meta-item"><div class="meta-label">추천</div><div class="meta-value" id="foodCount">로딩 중</div></div>
        </div>
        <div class="filters" aria-label="맛집 필터">
          <input class="filter-control" id="searchInput" type="search" placeholder="식당, 동네, 장르 검색" />
          <select class="filter-control" id="boroughFilter" aria-label="지역">
            <option value="">전체 지역</option>
          </select>
          <select class="filter-control" id="priceFilter" aria-label="예산">
            <option value="">전체 예산</option>
          </select>
          <select class="filter-control" id="reservationFilter" aria-label="예약">
            <option value="">전체 예약 방식</option>
          </select>
          <select class="filter-control" id="distanceFilter" aria-label="거리">
            <option value="">전체 거리</option>
            <option value="1">1mi 이내</option>
            <option value="3">3mi 이내</option>
            <option value="5">5mi 이내</option>
          </select>
        </div>
        <div class="location-row">
          <button class="location-button" id="useLocationButton" type="button">현재 위치 기준</button>
          <button class="location-button secondary" id="clearLocationButton" type="button" hidden>위치 해제</button>
          <div class="location-status" id="locationStatus">위치 허용 시 가까운 순으로 정렬합니다.</div>
        </div>
        <div class="filter-tags" id="buzzFilters" aria-label="검증 태그"></div>
      </div>
    </section>
    <section class="section">
      <div class="card">
        <div class="place-list" id="foodList"><div class="loading">맛집 데이터를 불러오는 중입니다.</div></div>
      </div>
    </section>
  </main>
  <script>
    const state = {
      allItems: [],
      filters: {
        search: '',
        borough: '',
        price: '',
        reservation: '',
        distance: '',
        buzz: ''
      },
      userLocation: null,
      sortByDistance: false
    };

    const priceLabels = {
      '$': '가볍게',
      '$$': '보통',
      '$$$': '예약 저녁',
      '$$$$': '스페셜'
    };

    const byId = id => document.getElementById(id);
    const normalize = value => String(value || '').toLowerCase().trim();
    const unique = values => [...new Set(values.filter(Boolean))];
    const toRadians = degrees => degrees * Math.PI / 180;

    function distanceMiles(a, b) {
      const earthRadiusMiles = 3958.8;
      const dLat = toRadians(b.lat - a.lat);
      const dLng = toRadians(b.lng - a.lng);
      const lat1 = toRadians(a.lat);
      const lat2 = toRadians(b.lat);
      const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return 2 * earthRadiusMiles * Math.asin(Math.sqrt(h));
    }

    function formatDistance(miles) {
      if (typeof miles !== 'number' || Number.isNaN(miles)) return '';
      return miles < 0.1 ? '<0.1 mi' : `${miles.toFixed(miles < 10 ? 1 : 0)} mi`;
    }

    function updateDistances() {
      state.allItems = state.allItems.map(item => ({
        ...item,
        distanceMiles: state.userLocation && typeof item.lat === 'number' && typeof item.lng === 'number'
          ? distanceMiles(state.userLocation, { lat: item.lat, lng: item.lng })
          : null
      }));
    }

    function renderOptions(selectId, values, labeler = value => value) {
      const select = byId(selectId);
      const first = select.options[0];
      select.innerHTML = '';
      select.appendChild(first);
      values.forEach(value => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = labeler(value);
        select.appendChild(option);
      });
    }

    function itemMatches(item) {
      const haystack = normalize([
        item.name,
        item.desc,
        item.neighborhood,
        item.borough,
        item.cuisine,
        ...(item.chips || []),
        ...(item.buzz || [])
      ].join(' '));

      return (!state.filters.search || haystack.includes(normalize(state.filters.search)))
        && (!state.filters.borough || item.borough === state.filters.borough)
        && (!state.filters.price || item.price === state.filters.price)
        && (!state.filters.reservation || item.reservation === state.filters.reservation)
        && (!state.filters.distance || (typeof item.distanceMiles === 'number' && item.distanceMiles <= Number(state.filters.distance)))
        && (!state.filters.buzz
          || item.borough === state.filters.buzz
          || item.neighborhood === state.filters.buzz
          || (item.buzz || []).includes(state.filters.buzz)
          || (item.chips || []).includes(state.filters.buzz));
    }

    function renderBuzzFilters(items) {
      const preferred = ['리뷰 10k+', '리뷰 1k+', '사진 1k+', '클래식', '관광동선', '예약필수', '워크인', '브런치', '디저트', '피자', '스테이크', '파인다이닝', 'Theater District', 'Times Square', 'Brooklyn'];
      const available = unique(items.flatMap(item => [...(item.buzz || []), ...(item.chips || [])]));
      const tags = preferred.filter(tag => available.includes(tag));
      byId('buzzFilters').innerHTML = [
        `<button class="filter-tag ${state.filters.buzz === '' ? 'active' : ''}" type="button" data-buzz="">전체</button>`,
        ...tags.map(tag => `<button class="filter-tag ${state.filters.buzz === tag ? 'active' : ''}" type="button" data-buzz="${tag}">${tag}</button>`)
      ].join('');
      byId('buzzFilters').querySelectorAll('.filter-tag').forEach(button => {
        button.addEventListener('click', () => {
          state.filters.buzz = button.dataset.buzz;
          render();
        });
      });
    }

    function render() {
      const filtered = state.allItems.filter(itemMatches).sort((a, b) => {
        if (!state.sortByDistance) return 0;
        const aDistance = typeof a.distanceMiles === 'number' ? a.distanceMiles : Infinity;
        const bDistance = typeof b.distanceMiles === 'number' ? b.distanceMiles : Infinity;
        return aDistance - bDistance;
      });
      byId('foodCount').textContent = `${filtered.length} / ${state.allItems.length}곳`;
      renderBuzzFilters(state.allItems);

      byId('foodList').innerHTML = filtered.length ? filtered.map(item => `
        <div class="place-card">
          <div class="thumb" style="background-image:url('${item.image.url}')"></div>
          <div>
            <div class="title">${item.name}</div>
            <div class="desc">${item.desc}</div>
            <div class="details">
              <span>${item.borough || 'NYC'}</span>
              <span class="detail-dot">${item.neighborhood || '동네 미정'}</span>
              <span class="detail-dot">${item.cuisine || '장르 미정'}</span>
              <span class="detail-dot">${item.price || '-'}</span>
              <span class="detail-dot">${item.reservation || '예약 정보 미정'}</span>
              ${typeof item.distanceMiles === 'number' ? `<span class="detail-dot distance-chip">${formatDistance(item.distanceMiles)}</span>` : ''}
            </div>
            <div class="chips">${(item.chips || []).map(chip => `<span class="chip">${chip}</span>`).join('')}</div>
          </div>
        </div>
      `).join('') : '<div class="loading">조건에 맞는 맛집이 없습니다. 필터를 줄여보세요.</div>';
    }

    Promise.all([
      fetch('./data/food.json').then(res => res.json()),
      fetch('./data/places.json').then(res => res.json())
    ])
      .then(([foodRefs, places]) => {
        const placeMap = new Map((places.food || []).map(place => [place.id, place]));
        state.allItems = foodRefs.map(ref => placeMap.get(ref.placeId)).filter(Boolean);

        renderOptions('boroughFilter', unique(state.allItems.map(item => item.borough)).sort());
        renderOptions('priceFilter', unique(state.allItems.map(item => item.price)).sort((a, b) => a.length - b.length), value => `${value} · ${priceLabels[value] || value}`);
        renderOptions('reservationFilter', unique(state.allItems.map(item => item.reservation)).sort());

        byId('searchInput').addEventListener('input', event => {
          state.filters.search = event.target.value;
          render();
        });
        byId('boroughFilter').addEventListener('change', event => {
          state.filters.borough = event.target.value;
          render();
        });
        byId('priceFilter').addEventListener('change', event => {
          state.filters.price = event.target.value;
          render();
        });
        byId('reservationFilter').addEventListener('change', event => {
          state.filters.reservation = event.target.value;
          render();
        });
        byId('distanceFilter').addEventListener('change', event => {
          state.filters.distance = event.target.value;
          render();
        });
        byId('useLocationButton').addEventListener('click', () => {
          const status = byId('locationStatus');
          if (!navigator.geolocation) {
            status.textContent = '이 브라우저에서는 현재 위치를 사용할 수 없습니다.';
            return;
          }

          status.textContent = '현재 위치를 확인하는 중입니다.';
          navigator.geolocation.getCurrentPosition(position => {
            state.userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            state.sortByDistance = true;
            updateDistances();
            byId('clearLocationButton').hidden = false;
            status.textContent = '현재 위치 기준 가까운 순으로 정렬 중입니다.';
            render();
          }, () => {
            status.textContent = '위치 권한을 허용하면 가까운 맛집을 볼 수 있습니다.';
          }, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 300000
          });
        });
        byId('clearLocationButton').addEventListener('click', () => {
          state.userLocation = null;
          state.sortByDistance = false;
          state.filters.distance = '';
          byId('distanceFilter').value = '';
          byId('clearLocationButton').hidden = true;
          byId('locationStatus').textContent = '위치 허용 시 가까운 순으로 정렬합니다.';
          updateDistances();
          render();
        });

        render();
      })
      .catch(() => {
        document.getElementById('foodCount').textContent = '불러오기 실패';
        document.getElementById('foodList').innerHTML = '<div class="loading">맛집 데이터를 불러오지 못했습니다.</div>';
      });
  </script>
</body>
</html>
